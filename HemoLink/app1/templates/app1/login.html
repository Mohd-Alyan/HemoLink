{% extends 'app1/base.html' %}

{% block title %}Access Portal - HemoLink{% endblock %}

{% block content %}
<div class="px-6 py-16 lg:py-24 max-w-4xl mx-auto flex justify-center items-center min-h-[70vh]">
    <div class="bg-white rounded-3xl p-8 sm:p-12 w-full max-w-lg shadow-2xl relative overflow-hidden fade-up">
        
        <!-- Decorative bg circle -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-red-50 rounded-full blur-3xl opacity-60 pointer-events-none"></div>

        <div class="text-center mb-10">
            <h2 class="text-3xl font-extrabold text-brand-dark tracking-tight mb-2">Access Portal</h2>
            <p class="text-sm text-gray-500 font-medium">Log in to manage your medical profile or register.</p>
        </div>

        <!-- Form Toggle -->
        <div class="flex bg-gray-100 p-1 rounded-full mb-8 relative">
            <div class="absolute inset-y-1 left-1 w-[calc(50%-4px)] bg-white rounded-full shadow transition-transform duration-300 transform" id="toggle-slider"></div>
            <button onclick="toggleForm('login')" id="btn-login" class="flex-1 py-2 text-sm font-bold text-brand-dark z-10 transition-colors">Login</button>
            <button onclick="toggleForm('register')" id="btn-register" class="flex-1 py-2 text-sm font-bold text-gray-500 z-10 transition-colors">Register</button>
        </div>

        <!-- Forms Container -->
        <div class="relative h-[520px]">
            
            <!-- Login Form -->
            <form id="form-login" class="absolute w-full px-1 transition-all duration-500 ease-in-out transform opacity-100 translate-x-0" method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="hidden" name="form_type" value="login">
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 tracking-wide mb-1">USERNAME</label>
                        <input type="text" name="username" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-red focus:border-transparent outline-none transition font-medium" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 tracking-wide mb-1">PASSWORD</label>
                        <input type="password" name="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-red focus:border-transparent outline-none transition font-medium" required>
                    </div>
                    <div class="flex items-center justify-between pt-2">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" class="form-checkbox text-brand-red rounded border-gray-300 focus:ring-brand-red focus:ring-2 focus:ring-offset-1 w-4 h-4 transition">
                            <span class="ml-2 text-xs font-semibold text-gray-500">Remember Me</span>
                        </label>
                        <a href="#" class="text-xs font-bold text-brand-red hover:text-red-800 transition">Forgot Password?</a>
                    </div>
                    <button type="submit" class="w-full bg-brand-dark text-white font-bold py-4 rounded-xl hover:bg-black transition-all shadow-[0_8px_30px_rgb(26,26,26,0.3)] mt-6">
                        Secure Login
                    </button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="form-register" class="absolute w-full px-1 transition-all duration-500 ease-in-out transform opacity-0 translate-x-full pointer-events-none" method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="hidden" name="form_type" value="register">
                <div class="space-y-3">
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-700 tracking-wide mb-1">USERNAME</label>
                            <input type="text" name="username" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-red focus:border-transparent outline-none transition font-medium" required>
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-700 tracking-wide mb-1">TYPE</label>
                            <select name="user_type" id="reg-user-type" onchange="toggleBloodGroup()" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-red focus:border-transparent outline-none transition font-medium text-sm appearance-none cursor-pointer" required>
                                <option value="donor">Donor</option>
                                <option value="patient">Patient</option>
                                <option value="hospital">Hospital / Clinic</option>
                                <option value="blood_bank">Blood Bank</option>
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-700 tracking-wide mb-1">EMAIL ADDRESS</label>
                        <input type="email" name="email" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-red focus:border-transparent outline-none transition font-medium" required>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-700 tracking-wide mb-1">PHONE NUMBER</label>
                            <input type="tel" name="phone_number" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-red focus:border-transparent outline-none transition font-medium">
                        </div>
                        <div class="flex-1" id="blood-group-field">
                            <label class="block text-xs font-bold text-gray-700 tracking-wide mb-1">BLOOD GROUP</label>
                            <select name="blood_group" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-red focus:border-transparent outline-none transition font-medium text-sm appearance-none cursor-pointer">
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex gap-4">
                         <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-700 tracking-wide mb-1">PASSWORD</label>
                            <input type="password" name="password" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-red focus:border-transparent outline-none transition font-medium" required>
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-700 tracking-wide mb-1">CONFIRM</label>
                            <input type="password" name="confirm_password" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-brand-red focus:border-transparent outline-none transition font-medium" required>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-brand-red text-white font-bold py-3.5 rounded-xl hover:bg-red-800 transition-all shadow-[0_8px_30px_rgb(193,18,31,0.3)] mt-4">
                        Create Account
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function toggleBloodGroup() {
        const userType = document.getElementById('reg-user-type').value;
        const bgField = document.getElementById('blood-group-field');
        bgField.style.display = (userType === 'donor') ? 'block' : 'none';
    }

    function toggleForm(type) {
        const loginForm = document.getElementById('form-login');
        const registerForm = document.getElementById('form-register');
        const slider = document.getElementById('toggle-slider');
        const btnLogin = document.getElementById('btn-login');
        const btnRegister = document.getElementById('btn-register');

        if (type === 'register') {
            loginForm.classList.remove('opacity-100', 'translate-x-0');
            loginForm.classList.add('opacity-0', '-translate-x-full', 'pointer-events-none');
            
            registerForm.classList.remove('opacity-0', 'translate-x-full', 'pointer-events-none');
            registerForm.classList.add('opacity-100', 'translate-x-0');
            
            slider.style.transform = 'translateX(100%)';
            btnLogin.classList.remove('text-brand-dark');
            btnLogin.classList.add('text-gray-500');
            btnRegister.classList.remove('text-gray-500');
            btnRegister.classList.add('text-brand-dark');
        } else {
            registerForm.classList.remove('opacity-100', 'translate-x-0');
            registerForm.classList.add('opacity-0', 'translate-x-full', 'pointer-events-none');
            
            loginForm.classList.remove('opacity-0', '-translate-x-full', 'pointer-events-none');
            loginForm.classList.add('opacity-100', 'translate-x-0');
            
            slider.style.transform = 'translateX(0)';
            btnRegister.classList.remove('text-brand-dark');
            btnRegister.classList.add('text-gray-500');
            btnLogin.classList.remove('text-gray-500');
            btnLogin.classList.add('text-brand-dark');
        }
    }
</script>
{% endblock %}
